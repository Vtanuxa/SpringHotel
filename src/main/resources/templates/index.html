<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Меню</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        button {
            font-size: 16px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="container text-center mt-5">
    <h1>Панель управления</h1>

    <div class="mt-4">
        <button onclick="location.href='/rooms/add-room'">➕ Добавить комнату</button>
        <button onclick="location.href='/clients/add-client'">👤 Добавить клиента</button>
        <button onclick="location.href='/bookings/add-booking'">📅 Добавить бронирование</button>
    </div>

    <div class="mt-4">
        <a href="/rooms/list">📋 Список комнат</a> |
        <a href="/clients/list">👥 Список клиентов</a> |
        <a href="/bookings/list">📊 Список бронирований</a>
    </div>

    <div class="mt-5">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger">🚪 Выйти</button>
        </form>
    </div>
</div>
</body>
</html>
