<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Авторизация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container" style="max-width: 500px; margin-top: 100px;">
    <h1 class="text-center mb-4">Авторизация</h1>

    <!-- Сообщение об ошибке -->
    <div th:if="${param.error}" class="alert alert-danger">
        Неверное имя пользователя или пароль
    </div>

    <!-- Сообщение о выходе -->
    <div th:if="${param.logout}" class="alert alert-info">
        Вы успешно вышли из системы
    </div>

    <!-- Сообщение об успешной регистрации -->
    <div th:if="${param.registered}" class="alert alert-success">
        Регистрация прошла успешно! Войдите в систему.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Имя пользователя</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Пароль</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
            <label class="form-check-label" for="remember-me">Запомнить меня</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
    </form>

    <div class="text-center mt-3">
        <a th:href="@{/register}">Нет аккаунта? Зарегистрируйтесь</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
